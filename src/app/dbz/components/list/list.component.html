<h4>Listado</h4>
<ul class="list-group">
  <li
    class="list-group-item d-flex justify-content-between align-items-center"
    [ngClass]="{'list-group-item-light': isEven}"
    *ngFor="let character of characterList;
    let i = index;
    let isEven = even;">

  <div>
    <span class="text-primary">{{ i + 1 }}. </span>
    <span>{{ character.name }} - </span>
    <strong>Power: </strong>
    <span>{{ character.power }}</span>
  </div>

    <button class="btn btn-danger" (click)="deleteCharacterById(character.id!)">X</button>
  </li>
</ul>
